<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phonetic</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👋</text></svg>">
  <meta name="description" content="Language training wheels. For first languages and new ones.">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <meta property="og:title" content="Phonetic">
  <meta property="og:description" content="Language training wheels. For first languages and new ones.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://inkling.ink">
  <meta property="og:site_name" content="Phonetic">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Phonetic">
  <meta name="twitter:description" content="Language training wheels. For first languages and new ones.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --color-text: #1d1d1f;
      --color-text-secondary: #86868b;
      --color-bg: #ffffff;
    }

    html {
      -webkit-text-size-adjust: 100%;
      font: -apple-system-body;
      font-family: var(--font);
    }

    body {
      font-family: var(--font);
      color: var(--color-text);
      background: var(--color-bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
    }

    .teaser {
      text-align: center;
      padding: 2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .teaser-name {
      font-size: clamp(4rem, 12vw, 8rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 0.75rem;
    }

    .teaser-ipa {
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 300;
      color: var(--color-text-secondary);
      letter-spacing: 0.05em;
    }

    .teaser-coming {
      font-size: clamp(0.75rem, 1.25vw, 0.875rem);
      font-weight: 400;
      color: var(--color-text-secondary);
      padding-bottom: 3rem;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-text: #f5f5f7;
        --color-text-secondary: #86868b;
        --color-bg: #000000;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <main class="teaser">
    <h1 class="teaser-name">Phonetic</h1>
    <p class="teaser-ipa">/fun&#xB7;ET&#xB7;ik/</p>
  </main>
  <p class="teaser-coming">Coming soon</p>

</body>
</html>
