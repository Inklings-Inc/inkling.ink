<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f5f7"/>
    </linearGradient>
    <linearGradient id="rainbow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0.00" stop-color="#ff453a"/>
      <stop offset="0.20" stop-color="#ff9f0a"/>
      <stop offset="0.40" stop-color="#ffd60a"/>
      <stop offset="0.60" stop-color="#30d158"/>
      <stop offset="0.80" stop-color="#0a84ff"/>
      <stop offset="1.00" stop-color="#bf5af2"/>
    </linearGradient>
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Rainbow accent bar at top -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#rainbow)"/>

  <!-- App icon -->
  <g filter="url(#iconShadow)" transform="translate(110 175)">
    <rect width="280" height="280" rx="74" fill="#e5e5ea" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
    <text x="140" y="215" text-anchor="middle" font-size="180" font-family="Apple Color Emoji, Segoe UI Emoji, sans-serif">🐙</text>
  </g>

  <!-- Text block -->
  <g font-family="ui-rounded, 'SF Pro Rounded', -apple-system, BlinkMacSystemFont, system-ui, sans-serif" fill="#1d1d1f">
    <text x="450" y="270" font-size="92" font-weight="700" letter-spacing="-3">Meet Otto.</text>
    <text x="450" y="345" font-size="40" font-weight="500" fill="#6e6e73" letter-spacing="-0.5">A voice-first AI agent for the whole family.</text>
    <text x="450" y="455" font-size="36" font-weight="600" letter-spacing="-0.5">Bring Otto home May 7.</text>
  </g>

  <!-- Small Inklings wordmark bottom-left -->
  <text x="60" y="590" font-family="ui-rounded, 'SF Pro Rounded', -apple-system, system-ui, sans-serif" font-size="22" font-weight="600" fill="#6e6e73" letter-spacing="-0.3">inkling.ink</text>

  <!-- Rainbow accent bar at bottom -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#rainbow)"/>
</svg>
